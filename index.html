<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中近史刷题</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #17202f;
      --muted: #697386;
      --line: #d8dee9;
      --blue: #1d4ed8;
      --green: #138a55;
      --red: #c0392b;
      --amber: #b26a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    [hidden] { display: none !important; }
    .login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%);
    }
    .login-panel {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 18px 42px rgba(15, 23, 42, .12);
    }
    .login-panel h1 {
      color: var(--ink);
      margin-bottom: 8px;
    }
    .login-panel p {
      color: var(--muted);
      margin: 0 0 18px;
      line-height: 1.6;
    }
    .login-form {
      display: grid;
      gap: 12px;
    }
    .login-form input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 16px;
    }
    .user-card {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      border-radius: 8px;
      padding: 12px;
      margin: -8px 0 16px;
    }
    .user-card span {
      display: block;
      color: #cbd5e1;
      font-size: 12px;
      margin-bottom: 5px;
    }
    .user-card strong {
      display: block;
      font-size: 17px;
      margin-bottom: 10px;
      overflow-wrap: anywhere;
    }
    .user-card button {
      width: 100%;
      min-height: 36px;
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.18);
      color: #f8fafc;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
    }
    aside {
      border-right: 1px solid var(--line);
      background: #101828;
      color: #f8fafc;
      padding: 24px 18px;
    }
    h1 {
      margin: 0 0 22px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .stat-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      border-radius: 8px;
      padding: 12px;
    }
    .stat span { display: block; color: #cbd5e1; font-size: 12px; }
    .stat strong { display: block; margin-top: 5px; font-size: 22px; }
    .side-actions { display: grid; gap: 10px; }
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      min-height: 42px;
      padding: 0 14px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { border-color: #94a3b8; }
    button.primary { background: var(--blue); color: white; border-color: var(--blue); }
    button.warn { color: var(--red); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    main { padding: 22px; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin: 0 auto 16px;
      max-width: 980px;
    }
    .progress {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }
    .panel {
      max-width: 980px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .question-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    .badge {
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      padding: 5px 10px;
      font-size: 13px;
    }
    .source {
      color: var(--muted);
      font-size: 13px;
    }
    .image-wrap {
      padding: 18px;
      display: flex;
      justify-content: center;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
    }
    .image-wrap img {
      max-width: 100%;
      height: auto;
      background: white;
      border: 1px solid #e5e7eb;
    }
    .choices {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 16px;
    }
    .choice {
      min-height: 54px;
      font-size: 20px;
      font-weight: 700;
      border-color: #cbd5e1;
    }
    .choice.selected {
      border-color: var(--blue);
      background: #eff6ff;
      color: var(--blue);
    }
    .choice.correct {
      border-color: var(--green);
      background: #ecfdf3;
      color: var(--green);
    }
    .choice.wrong {
      border-color: var(--red);
      background: #fff1f2;
      color: var(--red);
    }
    .actions {
      display: flex;
      gap: 10px;
      padding: 0 16px 16px;
    }
    .result {
      min-height: 34px;
      padding: 0 16px 14px;
      font-size: 15px;
      color: var(--muted);
    }
    .result.ok { color: var(--green); }
    .result.bad { color: var(--red); }
    .empty {
      max-width: 720px;
      margin: 80px auto 0;
      text-align: center;
      color: var(--muted);
    }
    .empty h2 { color: var(--ink); font-size: 28px; margin: 0 0 12px; }
    @media (max-width: 780px) {
      .app { grid-template-columns: 1fr; }
      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 16px;
      }
      h1 { font-size: 21px; margin-bottom: 14px; }
      .stat-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .stat { padding: 9px; }
      .stat strong { font-size: 18px; }
      .side-actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      main { padding: 14px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .choices { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <section class="login-screen" id="loginScreen">
    <div class="login-panel">
      <h1>中近史刷题</h1>
      <p>输入昵称进入。你的正确率、错题和当前进度会保存在本机，下次进入后继续使用。</p>
      <div class="login-form">
        <input id="loginName" maxlength="24" autocomplete="username" placeholder="昵称">
        <button class="primary" id="loginButton">进入刷题</button>
      </div>
    </div>
  </section>
  <div class="app" id="appShell" hidden>
    <aside>
      <h1>中近史刷题</h1>
      <div class="user-card">
        <span>当前用户</span>
        <strong id="currentUserName"></strong>
        <button id="logoutButton">退出登录</button>
      </div>
      <div class="stat-grid">
        <div class="stat"><span>题库</span><strong id="bankTotal">0</strong></div>
        <div class="stat"><span>已答</span><strong id="doneTotal">0</strong></div>
        <div class="stat"><span>正确率</span><strong id="accuracy">0%</strong></div>
        <div class="stat"><span>错题</span><strong id="wrongTotal">0</strong></div>
      </div>
      <div class="side-actions">
        <button class="primary" id="startRandom">20 题</button>
        <button id="startAll">全部题目</button>
        <button id="startWrong">错题重做</button>
        <button class="warn" id="resetStats">清空统计</button>
      </div>
    </aside>
    <main>
      <div class="topbar">
        <div>
          <strong id="modeName">答题</strong>
          <div class="progress" id="progressText">未开始</div>
        </div>
        <div class="progress" id="sessionScore"></div>
      </div>
      <section class="panel" id="quizPanel" hidden>
        <div class="question-head">
          <span class="badge" id="typeBadge">单选</span>
          <span class="source" id="sourceText"></span>
        </div>
        <div class="image-wrap">
          <img id="questionImage" alt="题目">
        </div>
        <div class="choices" id="choices"></div>
        <div class="actions">
          <button class="primary" id="submitAnswer">提交</button>
          <button id="nextQuestion" hidden>下一题</button>
        </div>
        <div class="result" id="resultText"></div>
      </section>
      <section class="empty" id="emptyState">
        <h2>开始答题</h2>
        <button class="primary" id="emptyStart">抽取 20 题</button>
        <button id="emptyAll">全部题目</button>
      </section>
    </main>
  </div>
  <script>
    const QUESTIONS = [{"id": 1, "page": 2, "type": "single", "answer": "C", "image": "chunk:00:q_0001", "ocr": "[1]（单选）中国共产党在新民主主义革命不同时期提出的土地政篋的共同点是．00体现中国共产党的民主革命纲领2消火封建剥削制度3雄护农民基本利益4，促进社会经济发展"}, {"id": 2, "page": 2, "type": "single", "answer": "B", "image": "chunk:00:q_0002", "ocr": "[2]（单选）中共十七大召开的时间是0A:26"}, {"id": 3, "page": 2, "type": "single", "answer": "A", "image": "chunk:00:q_0003", "ocr": "[3]（单选）以下事件不属于“文革\"时期与“左''倾错误进行斗争的是0A：“一月革命\""}, {"id": 4, "page": 2, "type": "single", "answer": "D", "image": "chunk:00:q_0004", "ocr": "[4](单选）辛亥革命爆发后英美列强积极扶植袁世凯的主要原因是0A：清政府已经无可救药"}, {"id": 5, "page": 2, "type": "single", "answer": "A", "image": "chunk:00:q_0005", "ocr": "[5]（单选）武昌起义成功后，建立的政权是0A:湖北军政府"}, {"id": 6, "page": 2, "type": "single", "answer": "C", "image": "chunk:00:q_0006", "ocr": "[6]（单选）五四运动前夕，中国产业工人已经达到0余万人A:SO&100"}, {"id": 7, "page": 3, "type": "single", "answer": "D", "image": "chunk:00:q_0007", "ocr": "会）社会主义、社会民主主义以及新村主义、泛劳动主义等，各种社会主义流派的观点在各种报刊上纷然杂陈。各种社会主义流派，其中0占优势。中国先进分子是经过反复比较才选择马克思主义的。"}, {"id": 8, "page": 3, "type": "single", "answer": "D", "image": "chunk:00:q_0008", "ocr": "[8]（单选）五四运动很快发展成为全国性的爱国运动，这充分说明．0A:上工人觉悟高"}, {"id": 9, "page": 3, "type": "single", "answer": "B", "image": "chunk:00:q_0009", "ocr": "[9]（单选冲国近代史上，共和政体确立的标志是0A：湖北军政府成立"}, {"id": 10, "page": 3, "type": "single", "answer": "D", "image": "chunk:00:q_0010", "ocr": "[10]（单选冲国共产党二大的中心任务是0A：确定党的最高奋斗目标"}, {"id": 11, "page": 3, "type": "single", "answer": "D", "image": "chunk:00:q_0011", "ocr": "[11]（单选）中国工农红军进行长征的直接原因是0A：“左\"倾思想的泛滥B：右倾投降主义思想出现"}, {"id": 12, "page": 3, "type": "single", "answer": "B", "image": "chunk:00:q_0012", "ocr": "[12]（单选）三民主义要解决的主要「司题是0A：中华民族和帝国主义的矛盾"}, {"id": 13, "page": 4, "type": "single", "answer": "C", "image": "chunk:00:q_0013", "ocr": "[13]（单选）据中共六大时的不完全统计：从1g27年3月到1g28年上半年，被杀害的共产党员和革命群众达0多人，其中共产党员260m多人。A:S万"}, {"id": 14, "page": 4, "type": "single", "answer": "B", "image": "chunk:00:q_0014", "ocr": "[14](单选航战胜利后，美国在中国追求的短期目标，首先是0A:推动建立一个统一的亲美政府"}, , "ocr": "[g15]（判断）1g22年7月中共二大提出了反帝反军溪的民主革命纲领。A：正确"}, {"id": 848, "page": 146, "type": "judge", "answer": "B", "image": "chunk:11:q_0848", "ocr": "[g16]（判断逝代中国历史进程中：资本帝国主义势力没有操控中国的财政经济命脉。0A:正确"}, {"id": 849, "page": 146, "type": "judge", "answer": "A", "image": "chunk:11:q_0849", "ocr": "[g17]（判断）从1g56年社会主义改造基本完成到1g66年文化大革命的前夕，是开始全面建设社会主义的十年。0A:正确"}, {"id": 850, "page": 146, "type": "judge", "answer": "A", "image": "chunk:11:q_0850", "ocr": "[g18]（判断）民族资产阶级同外国资本主义、本国封建主义仍然有着手丝万缕的联系，在政治上禾现出两面性。0A：正确"}, {"id": 851, "page": 146, "type": "judge", "answer": "B", "image": "chunk:11:q_0851", "ocr": "[919](判断）鸦片战争后，西方列强一再谋求扩大在华的传教权，其根本目的是传播西方文化。A：正确&错误"}, {"id": 852, "page": 147, "type": "judge", "answer": "A", "image": "chunk:11:q_0852", "ocr": "[92蚓判断）中国共产党的成立，深刻改变了近代以后中华民族发展的方向和进程，深刻改变了中国人民和中华民族的前途和命运，深刻改变了世界发展的趋势和格局。0A：正确"}, {"id": 853, "page": 147, "type": "judge", "answer": "A", "image": "chunk:11:q_0853", "ocr": "[g22]（判断）中国共产党一经成立，就把实现共产主义作为党的最高理想和最终目标，义无反0肩负起实现中华民族伟大复兴的历史使命。0A:正确"}, {"id": 854, "page": 147, "type": "judge", "answer": "B", "image": "chunk:11:q_0854", "ocr": "[g23]（判断）重庆谈判期可中国共产党领导人民军队取得自卫战争胜利的战役是邯郸战役。A：正确B：错误"}, {"id": 855, "page": 147, "type": "judge", "answer": "B", "image": "chunk:11:q_0855", "ocr": "[g25]（判断）戊戌维新运动的宗旨是中体西用。0A：正确"}, {"id": 856, "page": 147, "type": "judge", "answer": "A", "image": "chunk:11:q_0856", "ocr": "[g26]（判断航日战争时期，抗日民主政权实行“三三制\"组织原则。0A：正确"}, {"id": 857, "page": 147, "type": "judge", "answer": "B", "image": "chunk:11:q_0857", "ocr": "[g27]（判断航战争时期，中国共产党在农村的土地政篋是没收地主的土地分配给农民。0A:正确B:错误"}, {"id": 858, "page": 147, "type": "judge", "answer": "A", "image": "chunk:11:q_0858", "ocr": "[g28]（判断）《临时约法》具有资产阶级共和国宪法性质。0A:正确"}, {"id": 859, "page": 148, "type": "judge", "answer": "A", "image": "chunk:11:q_0859", "ocr": "[929]（判断）国民革命失败后，中国革命进入低潮。0A：正确&错误"}];
    const LEGACY_STORE_KEY = "zhongjinshi_quiz_stats_v1";
    const CURRENT_USER_KEY = "zhongjinshi_quiz_current_user_v2";
    const STATS_PREFIX = "zhongjinshi_quiz_stats_user_v2:";
    const PROGRESS_PREFIX = "zhongjinshi_quiz_progress_user_v2:";
    const LETTERS = ["A", "B", "C", "D"];
    const DEFAULT_STATE = () => ({
      session: [],
      index: 0,
      selected: new Set(),
      checked: false,
      sessionCorrect: 0,
      mode: "答题"
    });
    let currentUser = "";
    let state = DEFAULT_STATE();

    function normalizeUserName(name) {
      return name.trim().replace(/\s+/g, " ").slice(0, 24);
    }

    function userId() {
      return encodeURIComponent(currentUser);
    }

    function statsKey() {
      return STATS_PREFIX + userId();
    }

    function progressKey() {
      return PROGRESS_PREFIX + userId();
    }

    function migrateLegacyStats() {
      if (!currentUser || localStorage.getItem(statsKey())) return;
      const legacy = localStorage.getItem(LEGACY_STORE_KEY);
      if (legacy) localStorage.setItem(statsKey(), legacy);
    }

    function loadStats() {
      const fallback = { answered: 0, correct: 0, wrong: {} };
      if (!currentUser) return fallback;
      try {
        return Object.assign(fallback, JSON.parse(localStorage.getItem(statsKey()) || "{}"));
      } catch {
        return fallback;
      }
    }

    function saveStats(stats) {
      if (!currentUser) return;
      localStorage.setItem(statsKey(), JSON.stringify(stats));
    }

    function saveProgress() {
      if (!currentUser) return;
      const progress = {
        sessionIds: state.session.map(q => q.id),
        index: state.index,
        selected: [...state.selected],
        checked: state.checked,
        sessionCorrect: state.sessionCorrect,
        mode: state.mode
      };
      localStorage.setItem(progressKey(), JSON.stringify(progress));
    }

    function clearProgress() {
      if (currentUser) localStorage.removeItem(progressKey());
    }

    function loadProgress() {
      if (!currentUser) return null;
      try {
        const saved = JSON.parse(localStorage.getItem(progressKey()) || "null");
        if (!saved || !Array.isArray(saved.sessionIds) || !saved.sessionIds.length) return null;
        const byId = new Map(QUESTIONS.map(q => [q.id, q]));
        const session = saved.sessionIds.map(id => byId.get(id)).filter(Boolean);
        if (!session.length) return null;
        return {
          session,
          index: Math.min(Math.max(saved.index || 0, 0), session.length - 1),
          selected: new Set(Array.isArray(saved.selected) ? saved.selected : []),
          checked: !!saved.checked,
          sessionCorrect: saved.sessionCorrect || 0,
          mode: saved.mode || "答题"
        };
      } catch {
        return null;
      }
    }

    function updateStats() {
      const stats = loadStats();
      document.getElementById("bankTotal").textContent = QUESTIONS.length;
      document.getElementById("doneTotal").textContent = stats.answered || 0;
      document.getElementById("accuracy").textContent = stats.answered ? Math.round(stats.correct * 100 / stats.answered) + "%" : "0%";
      document.getElementById("wrongTotal").textContent = Object.keys(stats.wrong || {}).length;
    }

    function shuffle(items) {
      const arr = items.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function start(mode) {
      const stats = loadStats();
      let pool = QUESTIONS;
      state.mode = mode === "wrong" ? "错题重做" : mode === "all" ? "全部题目" : "20 题";
      if (mode === "wrong") {
        const ids = new Set(Object.keys(stats.wrong || {}).map(Number));
        pool = QUESTIONS.filter(q => ids.has(q.id));
      }
      state.session = mode === "all" ? shuffle(pool) : shuffle(pool).slice(0, 20);
      state.index = 0;
      state.sessionCorrect = 0;
      state.selected = new Set();
      state.checked = false;
      saveProgress();
      render();
    }

    function currentQuestion() {
      return state.session[state.index];
    }


    const imageChunkCache = {};

    async function loadQuestionImage(q) {
      if (!q.image.startsWith("chunk:")) return q.image;
      const parts = q.image.split(":");
      const chunkName = `chunk_${parts[1]}.json`;
      const key = parts[2];
      if (!imageChunkCache[chunkName]) {
        const response = await fetch(`chunks/${chunkName}`);
        imageChunkCache[chunkName] = await response.json();
      }
      return imageChunkCache[chunkName][key];
    }

    function render() {
      updateStats();
      document.getElementById("modeName").textContent = state.mode;
      document.getElementById("sessionScore").textContent = state.session.length ? `本轮 ${state.sessionCorrect}/${state.index + (state.checked ? 1 : 0)}` : "";
      if (!state.session.length) {
        document.getElementById("quizPanel").hidden = true;
        document.getElementById("emptyState").hidden = false;
        document.getElementById("progressText").textContent = state.mode === "错题重做" ? "暂无错题" : "未开始";
        return;
      }
      const q = currentQuestion();
      document.getElementById("quizPanel").hidden = false;
      document.getElementById("emptyState").hidden = true;
      document.getElementById("progressText").textContent = `${state.index + 1}/${state.session.length}`;
      document.getElementById("typeBadge").textContent = q.type === "multi" ? "多选" : q.type === "judge" ? "判断" : "单选";
      document.getElementById("sourceText").textContent = `第 ${q.page} 页 · #${q.id}`;
      const image = document.getElementById("questionImage");
      image.removeAttribute("src");
      loadQuestionImage(q).then(src => {
        if (currentQuestion()?.id === q.id) image.src = src;
      });
      document.getElementById("resultText").className = "result";
      document.getElementById("resultText").textContent = q.type === "multi" ? "可多选" : "";
      document.getElementById("submitAnswer").hidden = state.checked;
      document.getElementById("nextQuestion").hidden = !state.checked;
      renderChoices(q);
    }

    function renderChoices(q) {
      const wrap = document.getElementById("choices");
      wrap.innerHTML = "";
      for (const letter of LETTERS) {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = letter;
        if (state.selected.has(letter)) btn.classList.add("selected");
        if (state.checked && q.answer.includes(letter)) btn.classList.add("correct");
        if (state.checked && state.selected.has(letter) && !q.answer.includes(letter)) btn.classList.add("wrong");
        btn.disabled = state.checked;
        btn.addEventListener("click", () => toggleChoice(q, letter));
        wrap.appendChild(btn);
      }
    }

    function toggleChoice(q, letter) {
      if (state.checked) return;
      if (q.type === "multi") {
        state.selected.has(letter) ? state.selected.delete(letter) : state.selected.add(letter);
      } else {
        state.selected = new Set([letter]);
      }
      renderChoices(q);
      saveProgress();
    }

    function submit() {
      const q = currentQuestion();
      if (!q || !state.selected.size) return;
      const picked = [...state.selected].sort().join("");
      const answer = q.answer.split("").sort().join("");
      const ok = picked === answer;
      const stats = loadStats();
      stats.answered = (stats.answered || 0) + 1;
      stats.correct = (stats.correct || 0) + (ok ? 1 : 0);
      stats.wrong = stats.wrong || {};
      if (ok) {
        state.sessionCorrect += 1;
        delete stats.wrong[q.id];
      } else {
        stats.wrong[q.id] = (stats.wrong[q.id] || 0) + 1;
      }
      saveStats(stats);
      state.checked = true;
      saveProgress();
      const result = document.getElementById("resultText");
      result.className = ok ? "result ok" : "result bad";
      result.textContent = ok ? `正确：${q.answer}` : `错误，答案：${q.answer}`;
      document.getElementById("submitAnswer").hidden = true;
      document.getElementById("nextQuestion").hidden = false;
      renderChoices(q);
      updateStats();
      document.getElementById("sessionScore").textContent = `本轮 ${state.sessionCorrect}/${state.index + 1}`;
    }

    function next() {
      if (state.index >= state.session.length - 1) {
        state = DEFAULT_STATE();
        state.mode = "已完成";
        clearProgress();
        render();
        return;
      }
      state.index += 1;
      state.selected = new Set();
      state.checked = false;
      saveProgress();
      render();
    }

    function showLogin() {
      document.getElementById("appShell").hidden = true;
      document.getElementById("loginScreen").hidden = false;
      document.getElementById("loginName").focus();
    }

    function enterApp(name) {
      currentUser = normalizeUserName(name);
      if (!currentUser) return;
      localStorage.setItem(CURRENT_USER_KEY, currentUser);
      migrateLegacyStats();
      document.getElementById("currentUserName").textContent = currentUser;
      document.getElementById("loginScreen").hidden = true;
      document.getElementById("appShell").hidden = false;
      state = loadProgress() || DEFAULT_STATE();
      render();
    }

    function loginFromInput() {
      const name = normalizeUserName(document.getElementById("loginName").value);
      if (!name) {
        document.getElementById("loginName").focus();
        return;
      }
      enterApp(name);
    }

    function logout() {
      saveProgress();
      currentUser = "";
      localStorage.removeItem(CURRENT_USER_KEY);
      state = DEFAULT_STATE();
      showLogin();
    }

    document.getElementById("startRandom").addEventListener("click", () => start("random"));
    document.getElementById("startAll").addEventListener("click", () => start("all"));
    document.getElementById("emptyStart").addEventListener("click", () => start("random"));
    document.getElementById("emptyAll").addEventListener("click", () => start("all"));
    document.getElementById("startWrong").addEventListener("click", () => start("wrong"));
    document.getElementById("submitAnswer").addEventListener("click", submit);
    document.getElementById("nextQuestion").addEventListener("click", next);
    document.getElementById("resetStats").addEventListener("click", () => {
      if (confirm("清空当前用户的学习统计和做题进度？")) {
        localStorage.removeItem(statsKey());
        clearProgress();
        state = DEFAULT_STATE();
        updateStats();
        render();
      }
    });
    document.getElementById("loginButton").addEventListener("click", loginFromInput);
    document.getElementById("loginName").addEventListener("keydown", event => {
      if (event.key === "Enter") loginFromInput();
    });
    document.getElementById("logoutButton").addEventListener("click", logout);
    const rememberedUser = localStorage.getItem(CURRENT_USER_KEY);
    if (rememberedUser) {
      enterApp(rememberedUser);
    } else {
      showLogin();
    }
  </script>
